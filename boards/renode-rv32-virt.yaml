name: renode-rv32-virt
description: Generic 32-bit RISC-V board on Renode virt with NS16550 UART.
vendor: generic
architecture: riscv32
cpu: rv32imac
backend: renode
machine: virt
firmware_format: elf
memory_regions:
  - name: ram
    base: 0x80000000
    size: 0x08000000
    kind: ram
    permissions: rwx
peripherals:
  - name: cpu0
    kind: cpu
  - name: uart0
    kind: uart
    address: 0x10000000
    size: 0x100
  - name: plic
    kind: interrupt-controller
    address: 0x0C000000
    size: 0x00400000
  - name: clint
    kind: timer
    address: 0x02000000
    size: 0x00010000
backend_options:
  platform: platforms/renode-rv32-virt.repl
  monitor_commands:
    - showAnalyzer sysbus.uart0
    - start
